<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Exchange</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<main class="page-shell">
    <section class="hero-card">
        <p class="eyebrow">Spring Boot Full Stack Project</p>
        <h1>Skill Exchange Platform</h1>
        <p class="hero-copy">
            Register, login, add your skills, and connect with other users through exchange requests.
        </p>
    </section>

    <section class="panel">
        <h2>Create Account</h2>
        <div class="form-grid">
            <input id="name" type="text" placeholder="Name" required>
            <input id="email" type="email" placeholder="Email" required>
            <input id="password" type="password" placeholder="Password" required>
        </div>
        <button onclick="register()">Register</button>
        <p class="helper-text">Already registered?</p>
        <div class="link-row">
            <a href="/login.html">Login</a>
            <a href="/dashboard.html">Open Dashboard</a>
        </div>
    </section>
</main>

<script src="/script.js"></script>
</body>
</html>
